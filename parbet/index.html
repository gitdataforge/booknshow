<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- FEATURE 1: Strict Mobile Viewport Lock (Prevents UI breaking on input focus) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Parbet</title>
    
    <!-- FEATURE 2: Network Optimization & Warning Resolution -->
    <!-- Replacing direct preloads with dns-prefetch permanently stops the "preloaded but not used" console errors while maintaining speed -->
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- FEATURE 3: Database Preconnection for Rapid TTFB (Time to First Byte) -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    
    <!-- FEATURE 4: Progressive Web App (PWA) Theme Engine -->
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="application-name" content="Parbet" />
    
    <!-- FEATURE 5: Apple iOS Native App Emulation -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    
    <!-- FEATURE 6: Search Engine Optimization (SEO) Core Engine -->
    <meta name="description" content="Securely buy and sell premium event tickets on Parbet with 100% guarantee and instant digital delivery." />
    <meta name="keywords" content="tickets, events, concerts, sports, parbet, marketplace, live events" />
    
    <!-- FEATURE 7: Open Graph (OG) Social Media Unfurling (Facebook/LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Parbet | The Premier Ticket Marketplace" />
    <meta property="og:description" content="Securely buy and sell premium event tickets on Parbet. 100% Guaranteed." />
    <meta property="og:image" content="https://parbet-44902.web.app/vite.svg" />
    
    <!-- FEATURE 8: Twitter Cards Metadata Engine -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Parbet | Event Tickets" />
    <meta name="twitter:description" content="Securely buy and sell premium event tickets on Parbet. 100% Guaranteed." />
    <meta name="twitter:image" content="https://parbet-44902.web.app/vite.svg" />
    
    <!-- FEATURE 9: Search Engine Indexing Canonicalization -->
    <link rel="canonical" href="https://parbet-44902.web.app" />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FEATURE 10: Secure Razorpay Checkout SDK Integration -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
