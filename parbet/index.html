<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png+xml" href="/logo.png" />
    
    <!-- STRICT REQUIREMENT: ZERO-DELAY PNG LOGO PRELOADER -->
    <link rel="preload" href="/logo-2.png" as="image" type="image/png" />
    
    <!-- FEATURE 1: Strict Mobile Viewport Lock (Prevents UI breaking on input focus) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    
    <!-- FEATURE 2: Cross-Browser Legacy Render Engine Compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- GLOBAL REBRAND: Root Title Update -->
    <title>Booknshow</title>
    
    <!-- FEATURE 3: Network Optimization & Warning Resolution -->
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://booknshow.in" />
    
    <!-- FEATURE 4: Database Preconnection for Rapid TTFB (Time to First Byte) -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    
    <!-- FEATURE 5: Progressive Web App (PWA) Theme Engine - Updated to #333333 -->
    <meta name="theme-color" content="#333333" />
    <meta name="application-name" content="Booknshow" />
    
    <!-- FEATURE 6: Universal Web App Capable Resolution (Fixes Deprecation Warning) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <!-- FEATURE 7: Search Engine Optimization (SEO) Core Engine - Rebranded to Production Domain -->
    <meta name="description" content="Securely buy and sell premium event tickets on Booknshow with 100% guarantee and instant digital delivery." />
    <meta name="keywords" content="tickets, events, concerts, sports, booknshow, marketplace, live events, india tickets" />
    
    <!-- FEATURE 8: Open Graph (OG) Social Media Unfurling - Updated to booknshow.in -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://booknshow.in" />
    <meta property="og:title" content="Booknshow | The Premier Ticket Marketplace" />
    <meta property="og:description" content="Securely buy and sell premium event tickets on Booknshow. 100% Guaranteed." />
    <meta property="og:image" content="https://booknshow.in/logo.png" />
    <meta property="og:locale" content="en_IN" />
    
    <!-- FEATURE 9: Twitter Cards Metadata Engine - Updated to booknshow.in -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Booknshow | Event Tickets" />
    <meta name="twitter:description" content="Securely buy and sell premium event tickets on Booknshow. 100% Guaranteed." />
    <meta name="twitter:image" content="https://booknshow.in/logo.png" />
    <meta name="twitter:site" content="@booknshow" />
    
    <!-- FEATURE 10: Search Engine Indexing Canonicalization - Updated to booknshow.in -->
    <link rel="canonical" href="https://booknshow.in" />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FEATURE 11: Secure Razorpay Checkout SDK Integration -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
      /* HIGH-END TICKET PRELOADER STYLING */
      :root {
        --primary: #E7364D;
        --dark: #333333;
        --white: #FFFFFF;
      }
      body {
        margin: 0;
        background-color: #F5F5F5;
        overflow-x: hidden;
      }
      #preloader {
        position: fixed;
        inset: 0;
        background: var(--dark);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .ticket-container {
        width: 300px;
        position: relative;
        animation: ticketFloat 3s ease-in-out infinite;
      }
      @keyframes ticketFloat {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-20px) rotate(2deg); }
      }
      .ticket-svg {
        filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
      }
      .logo-pulse {
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      .bg-anim {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: radial-gradient(circle at 50% 50%, rgba(231, 54, 77, 0.1) 0%, transparent 70%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- HIGH-END BRANDED PRELOADER -->
    <div id="preloader">
      <div class="bg-anim"></div>
      <div class="ticket-container">
        <svg class="ticket-svg" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Ticket Base -->
          <path d="M0 20C0 8.95431 8.95431 0 20 0H380C391.046 0 400 8.95431 400 20V80C388.954 80 380 88.9543 380 100C380 111.046 388.954 120 400 120V180C400 191.046 391.046 200 380 200H20C8.95431 200 0 191.046 0 180V120C11.0457 120 20 111.046 20 100C20 88.9543 11.0457 80 0 80V20Z" fill="#FFFFFF"/>
          
          <!-- Perforation Line -->
          <line x1="300" y1="10" x2="300" y2="190" stroke="#A3A3A3" stroke-width="2" stroke-dasharray="10 10"/>
          
          <!-- STRICT REPLACEMENT: PNG LOGO IN TICKET -->
          <image href="/logo-2.png" x="40" y="50" width="200" height="50" class="logo-pulse" preserveAspectRatio="xMidYMid meet" />
          
          <!-- Ticket Subtitle -->
          <text x="50" y="130" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#A3A3A3" letter-spacing="2">ADMIT ONE | PREMIUM</text>
          
          <!-- Ticket Stub -->
          <rect x="320" y="40" width="60" height="120" fill="#333333" rx="4"/>
          <text x="350" y="105" transform="rotate(90 350 105)" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="#FFFFFF" text-anchor="middle">#2026-VIP</text>
        </svg>
      </div>
    </div>

    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Function to hide preloader after React mounts
      window.addEventListener('load', () => {
        const loader = document.getElementById('preloader');
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }, 1500);
      });
    </script>
  </body>
</html>
